<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>排行榜 — 兄弟押注局</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .lb-podium {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
      align-items: end;
    }

    .lb-podium-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 12px 16px;
      text-align: center;
      position: relative;
    }

    .lb-podium-card.rank-1 {
      border-color: var(--gold-border);
      background: linear-gradient(180deg, rgba(245,197,24,0.06) 0%, var(--surface) 100%);
      padding-top: 28px;
    }
    .lb-podium-card.rank-2 { border-color: rgba(180,180,210,0.2); }
    .lb-podium-card.rank-3 { border-color: rgba(180,120,60,0.2); }

    .podium-crown {
      position: absolute;
      top: -14px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 22px;
    }

    .podium-rank {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .rank-1 .podium-rank { color: var(--gold); }
    .rank-2 .podium-rank { color: #b4b4d2; }
    .rank-3 .podium-rank { color: #c07840; }

    .podium-avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 800;
      color: #09090f;
      margin: 0 auto 10px;
    }
    .rank-1 .podium-avatar { background: linear-gradient(135deg, var(--gold) 0%, #c9a000 100%); box-shadow: 0 0 20px rgba(245,197,24,0.3); }
    .rank-2 .podium-avatar { background: linear-gradient(135deg, #b4b4d2 0%, #7878a8 100%); }
    .rank-3 .podium-avatar { background: linear-gradient(135deg, #c07840 0%, #8a4e20 100%); }

    .podium-name {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .podium-balance {
      font-size: 15px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }
    .rank-1 .podium-balance { color: var(--gold); }
    .rank-2 .podium-balance { color: #b4b4d2; }
    .rank-3 .podium-balance { color: #c07840; }

    .lb-list {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .lb-list-header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: grid;
      grid-template-columns: 40px 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .lb-row {
      display: grid;
      grid-template-columns: 40px 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      transition: background var(--transition);
    }
    .lb-row:last-child { border-bottom: none; }
    .lb-row:hover { background: rgba(255,255,255,0.015); }
    .lb-row.me { background: var(--gold-dim); }
    .lb-row.me:hover { background: rgba(245,197,24,0.1); }

    .lb-rank-num {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-muted);
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .lb-player {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .lb-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--surface2);
      border: 1px solid var(--border-bright);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 800;
      color: var(--text-muted);
      flex-shrink: 0;
    }
    .lb-row.me .lb-avatar {
      background: linear-gradient(135deg, var(--gold) 0%, #c9a000 100%);
      color: #09090f;
      border-color: transparent;
    }

    .lb-name {
      font-size: 14px;
      font-weight: 700;
    }
    .lb-you {
      font-size: 11px;
      color: var(--gold);
      font-weight: 600;
      margin-left: 6px;
    }

    .lb-balance {
      font-size: 15px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      color: var(--text);
      text-align: right;
    }
    .lb-row.me .lb-balance { color: var(--gold); }

    .change-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: var(--radius-pill);
    }
    .change-up { background: var(--green-dim); color: var(--green); }
    .change-down { background: var(--red-dim); color: var(--red); }

    @media (max-width: 480px) {
      .lb-podium { gap: 6px; }
      .podium-avatar { width: 42px; height: 42px; font-size: 16px; }
      .podium-balance { font-size: 13px; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">
      <a href="/" style="color:var(--gold);text-decoration:none;font-size:14px;font-weight:600">← 大厅</a>
    </div>
    <div class="navbar-user">
      <span>余额 <span class="navbar-balance" id="navBalance">--</span></span>
      <span class="nav-username" id="navUsername">--</span>
    </div>
  </nav>

  <div class="container" style="max-width:600px">
    <div id="content"><div class="empty-state"><p>加载中...</p></div></div>
  </div>

  <script>
    async function init() {
      const [meRes, lbRes] = await Promise.all([
        fetch('/api/auth/me'),
        fetch('/api/auth/leaderboard')
      ]);
      const me = await meRes.json();
      if (!me.loggedIn) { window.location.href = '/login.html'; return; }
      document.getElementById('navUsername').textContent = me.username;
      document.getElementById('navBalance').textContent = '¥' + me.balance.toLocaleString();

      const users = lbRes.ok ? await lbRes.json() : [];
      render(users, me.username);
    }

    function render(users, myUsername) {
      if (!users.length) {
        document.getElementById('content').innerHTML = '<div class="empty-state"><p>暂无数据</p></div>';
        return;
      }

      let html = '';

      // Podium: top 3
      const top3 = users.slice(0, 3);
      // Reorder for visual podium: 2nd, 1st, 3rd
      const podiumOrder = [top3[1], top3[0], top3[2]].filter(Boolean);
      const podiumRanks = top3[1] ? [2, 1, 3] : [1];

      html += `<div class="lb-podium">`;
      podiumOrder.forEach((u, i) => {
        const rank = podiumRanks[i];
        const isMe = u.username === myUsername;
        html += `
          <div class="lb-podium-card rank-${rank}">
            ${rank === 1 ? '<div class="podium-crown">👑</div>' : ''}
            <div class="podium-rank">${rank === 1 ? '冠军' : rank === 2 ? '亚军' : '季军'}</div>
            <div class="podium-avatar">${u.username[0].toUpperCase()}</div>
            <div class="podium-name">${u.username}${isMe ? ' (你)' : ''}</div>
            <div class="podium-balance">¥${u.balance.toLocaleString()}</div>
          </div>`;
      });
      html += `</div>`;

      // Full list (rank 4+)
      const rest = users.slice(3);
      if (rest.length) {
        html += `<div class="lb-list">
          <div class="lb-list-header">
            <div>#</div><div>玩家</div><div>余额</div>
          </div>`;
        rest.forEach((u, i) => {
          const rank = i + 4;
          const isMe = u.username === myUsername;
          html += `
            <div class="lb-row${isMe ? ' me' : ''}">
              <div class="lb-rank-num">${rank}</div>
              <div class="lb-player">
                <div class="lb-avatar">${u.username[0].toUpperCase()}</div>
                <div class="lb-name">${u.username}${isMe ? '<span class="lb-you">你</span>' : ''}</div>
              </div>
              <div class="lb-balance">¥${u.balance.toLocaleString()}</div>
            </div>`;
        });
        html += `</div>`;
      } else {
        // If only ≤3 players, still show them in a simple list below podium for balance reference
        html += `<div class="lb-list">
          <div class="lb-list-header">
            <div>#</div><div>玩家</div><div>余额</div>
          </div>`;
        users.forEach((u, i) => {
          const isMe = u.username === myUsername;
          html += `
            <div class="lb-row${isMe ? ' me' : ''}">
              <div class="lb-rank-num">${i + 1}</div>
              <div class="lb-player">
                <div class="lb-avatar">${u.username[0].toUpperCase()}</div>
                <div class="lb-name">${u.username}${isMe ? '<span class="lb-you">你</span>' : ''}</div>
              </div>
              <div class="lb-balance">¥${u.balance.toLocaleString()}</div>
            </div>`;
        });
        html += `</div>`;
      }

      document.getElementById('content').innerHTML = html;
    }

    init();
  </script>
</body>
</html>
