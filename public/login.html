<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>破产模拟器 — 登录</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .login-card .form-group label {
      text-align: left;
    }
    .login-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 6px 0 20px;
      color: var(--text-muted);
      font-size: 11px;
    }
    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">🏀</div>
      <div class="login-title">破产模拟器</div>
      <div class="login-subtitle">Bankruptcy Simulator</div>

      <div class="form-group" style="text-align:left">
        <label>用户名</label>
        <input type="text" id="username" placeholder="输入用户名" autocomplete="username">
      </div>
      <div class="form-group" style="text-align:left">
        <label>密码</label>
        <input type="password" id="password" placeholder="输入密码" autocomplete="current-password">
      </div>

      <button class="btn btn-primary" id="loginBtn" onclick="login()">登 录</button>
      <div class="error-msg" id="errorMsg"></div>
      <div class="login-divider">还没有账号？</div>
      <a href="/register" class="btn btn-ghost" style="width:100%;justify-content:center;text-decoration:none">注 册</a>
    </div>
  </div>

  <script>
    document.getElementById('password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') login();
    });

    window.addEventListener('pageshow', () => {
      const btn = document.getElementById('loginBtn');
      btn.disabled = false;
      btn.textContent = '登 录';
    });

    async function login() {
      const btn = document.getElementById('loginBtn');
      const errorMsg = document.getElementById('errorMsg');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        errorMsg.textContent = '请输入用户名和密码';
        return;
      }

      btn.disabled = true;
      btn.textContent = '登录中...';
      errorMsg.textContent = '';

      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();

      if (data.success) {
        window.location.href = '/';
      } else {
        errorMsg.textContent = data.error || '登录失败';
        btn.disabled = false;
        btn.textContent = '登 录';
      }
    }
  </script>
</body>
</html>
