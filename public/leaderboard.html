<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>排行榜 — 兄弟押注局</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .tab-bar {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      padding: 4px;
      gap: 2px;
      margin-bottom: 14px;
    }
    .tab-btn {
      flex: 1;
      padding: 8px 12px;
      border-radius: var(--radius-pill);
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all var(--transition);
      text-align: center;
      white-space: nowrap;
    }
    .tab-btn.active { background: var(--gold); color: #09090f; }
    .tab-btn:hover:not(.active) { color: var(--text); }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .lb-podium {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
      align-items: end;
    }

    .lb-podium-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 12px 16px;
      text-align: center;
      position: relative;
    }
    .lb-podium-card.rank-1 {
      border-color: var(--gold-border);
      background: linear-gradient(180deg, rgba(245,197,24,0.06) 0%, var(--surface) 100%);
      padding-top: 28px;
    }
    .lb-podium-card.rank-2 { border-color: rgba(180,180,210,0.2); }
    .lb-podium-card.rank-3 { border-color: rgba(180,120,60,0.2); }

    .podium-crown { position: absolute; top: -14px; left: 50%; transform: translateX(-50%); font-size: 22px; }
    .podium-rank { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; }
    .rank-1 .podium-rank { color: var(--gold); }
    .rank-2 .podium-rank { color: #b4b4d2; }
    .rank-3 .podium-rank { color: #c07840; }

    .podium-avatar {
      width: 48px; height: 48px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 800; color: #09090f;
      margin: 0 auto 10px;
    }
    .rank-1 .podium-avatar { background: linear-gradient(135deg, var(--gold) 0%, #c9a000 100%); box-shadow: 0 0 20px rgba(245,197,24,0.3); }
    .rank-2 .podium-avatar { background: linear-gradient(135deg, #b4b4d2 0%, #7878a8 100%); }
    .rank-3 .podium-avatar { background: linear-gradient(135deg, #c07840 0%, #8a4e20 100%); }

    .podium-name { font-size: 12px; font-weight: 700; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .podium-balance { font-size: 14px; font-weight: 800; font-variant-numeric: tabular-nums; }
    .rank-1 .podium-balance { color: var(--gold); }
    .rank-2 .podium-balance { color: #b4b4d2; }
    .rank-3 .podium-balance { color: #c07840; }

    .lb-list {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .lb-list-header {
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 11px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.5px;
      display: grid; grid-template-columns: 40px 1fr auto; gap: 12px; align-items: center;
    }
    .lb-row {
      display: grid; grid-template-columns: 40px 1fr auto; gap: 12px;
      align-items: center; padding: 13px 20px;
      border-bottom: 1px solid var(--border);
      transition: background var(--transition);
    }
    .lb-row:last-child { border-bottom: none; }
    .lb-row:hover { background: rgba(255,255,255,0.015); }
    .lb-row.me { background: var(--gold-dim); }
    .lb-row.me:hover { background: rgba(245,197,24,0.1); }

    .lb-rank-num { font-size: 13px; font-weight: 700; color: var(--text-muted); text-align: center; font-variant-numeric: tabular-nums; }
    .lb-player { display: flex; align-items: center; gap: 12px; }
    .lb-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--surface2); border: 1px solid var(--border-bright);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 800; color: var(--text-muted); flex-shrink: 0;
    }
    .lb-row.me .lb-avatar { background: linear-gradient(135deg, var(--gold) 0%, #c9a000 100%); color: #09090f; border-color: transparent; }
    .lb-name { font-size: 14px; font-weight: 700; }
    .lb-you { font-size: 11px; color: var(--gold); font-weight: 600; margin-left: 6px; }
    .lb-value { font-size: 15px; font-weight: 800; font-variant-numeric: tabular-nums; text-align: right; }
    .lb-row.me .lb-value { color: var(--gold); }

    .week-reset-note {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 10px;
      padding: 8px;
    }

    @media (max-width: 480px) {
      .lb-podium { gap: 6px; }
      .podium-avatar { width: 38px; height: 38px; font-size: 14px; }
      .podium-balance { font-size: 12px; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">
      <a href="/" style="color:var(--gold);text-decoration:none;font-size:14px;font-weight:600">← 大厅</a>
    </div>
    <div class="navbar-user">
      <span>余额 <span class="navbar-balance" id="navBalance">--</span></span>
      <span class="nav-username" id="navUsername">--</span>
    </div>
  </nav>

  <div class="container" style="max-width:600px">

    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('balance')">手中余额</button>
      <button class="tab-btn" onclick="switchTab('wealth')">总资产</button>
      <button class="tab-btn" onclick="switchTab('weekly')">本周盈亏</button>
    </div>

    <div id="tab-balance" class="tab-content active"></div>
    <div id="tab-wealth" class="tab-content"></div>
    <div id="tab-weekly" class="tab-content"></div>

  </div>

  <script>
    let myUsername = '';

    async function init() {
      const [meRes, lbRes] = await Promise.all([
        fetch('/api/auth/me'),
        fetch('/api/auth/leaderboard')
      ]);
      const me = await meRes.json();
      if (!me.loggedIn) { window.location.href = '/login.html'; return; }
      myUsername = me.username;
      document.getElementById('navUsername').textContent = me.username;
      document.getElementById('navBalance').textContent = '¥' + me.balance.toLocaleString();

      if (!lbRes.ok) return;
      const { byBalance, byWealth, byWeekly } = await lbRes.json();

      renderList('tab-balance', byBalance, u => '¥' + u.balance.toLocaleString(), false);
      renderList('tab-wealth',  byWealth,  u => '¥' + u.total_wealth.toLocaleString(), false);
      renderList('tab-weekly',  byWeekly,  u => {
        const v = u.weekly_profit;
        return (v >= 0 ? '+¥' : '-¥') + Math.abs(v).toLocaleString();
      }, true);
    }

    function weeklyColor(u) {
      if (u.weekly_profit > 0) return 'var(--green)';
      if (u.weekly_profit < 0) return 'var(--red)';
      return 'var(--text-muted)';
    }

    function renderList(tabId, users, valFn, isWeekly) {
      if (!users.length) {
        document.getElementById(tabId).innerHTML = '<div class="empty-state"><p>暂无数据</p></div>';
        return;
      }

      let html = '';

      if (isWeekly) {
        // Get next Monday for reset note
        const now = new Date();
        const next = new Date(now);
        next.setDate(now.getDate() + ((1 + 7 - now.getDay()) % 7 || 7));
        next.setHours(0, 0, 0, 0);
        const diff = next - now;
        const days = Math.floor(diff / 86400000);
        const hrs  = Math.floor((diff % 86400000) / 3600000);
        html += `<div class="week-reset-note">每周一 00:00 重置 · 还有 ${days} 天 ${hrs} 小时</div>`;
      }

      // Podium
      const top3 = users.slice(0, 3);
      const podiumOrder = [top3[1], top3[0], top3[2]].filter(Boolean);
      const podiumRanks = top3[1] ? [2, 1, 3] : [1];

      html += `<div class="lb-podium">`;
      podiumOrder.forEach((u, i) => {
        const rank = podiumRanks[i];
        const isMe = u.username === myUsername;
        const valColor = isWeekly ? weeklyColor(u) : (rank === 1 ? 'var(--gold)' : rank === 2 ? '#b4b4d2' : '#c07840');
        html += `
          <div class="lb-podium-card rank-${rank}">
            ${rank === 1 ? '<div class="podium-crown">👑</div>' : ''}
            <div class="podium-rank">${rank === 1 ? '冠军' : rank === 2 ? '亚军' : '季军'}</div>
            <div class="podium-avatar">${u.username[0].toUpperCase()}</div>
            <div class="podium-name">${u.username}${isMe ? ' (你)' : ''}</div>
            <div class="podium-balance" style="color:${valColor}">${valFn(u)}</div>
          </div>`;
      });
      html += `</div>`;

      // Rest of list
      const rest = users.slice(3);
      const listUsers = rest.length ? rest : users;
      const startRank = rest.length ? 4 : 1;

      html += `<div class="lb-list">
        <div class="lb-list-header"><div>#</div><div>玩家</div><div>金额</div></div>`;

      listUsers.forEach((u, i) => {
        const rank = startRank + i;
        const isMe = u.username === myUsername;
        const color = isWeekly ? weeklyColor(u) : (isMe ? 'var(--gold)' : 'var(--text)');
        html += `
          <div class="lb-row${isMe ? ' me' : ''}">
            <div class="lb-rank-num">${rank}</div>
            <div class="lb-player">
              <div class="lb-avatar">${u.username[0].toUpperCase()}</div>
              <div class="lb-name">${u.username}${isMe ? '<span class="lb-you">你</span>' : ''}</div>
            </div>
            <div class="lb-value" style="color:${color}">${valFn(u)}</div>
          </div>`;
      });
      html += `</div>`;

      document.getElementById(tabId).innerHTML = html;
    }

    function switchTab(name) {
      document.querySelectorAll('.tab-btn').forEach((t, i) => {
        t.classList.toggle('active', ['balance', 'wealth', 'weekly'][i] === name);
      });
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.getElementById('tab-' + name).classList.add('active');
    }

    init();
  </script>
</body>
</html>
