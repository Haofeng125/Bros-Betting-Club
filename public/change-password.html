<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>修改密码 — 兄弟押注局</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .pwd-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 24px;
    }
    .pwd-card .form-group label { text-align: left; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">
      <a href="/me" style="color:var(--gold);text-decoration:none;font-size:14px;font-weight:600">← 我的主页</a>
    </div>
  </nav>

  <div class="container" style="max-width:480px">
    <div class="pwd-card">
      <div style="font-size:18px;font-weight:800;margin-bottom:22px">🔑 修改密码</div>

      <div class="form-group">
        <label>当前密码</label>
        <input type="password" id="curPwd" placeholder="输入当前密码" autocomplete="current-password">
      </div>
      <div class="form-group">
        <label>新密码</label>
        <input type="password" id="newPwd" placeholder="至少 6 位" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label>确认新密码</label>
        <input type="password" id="newPwd2" placeholder="再次输入新密码" autocomplete="new-password">
      </div>

      <button class="btn btn-primary" id="pwdBtn" onclick="changePassword()">确认修改</button>
      <div id="pwdMsg" style="font-size:13px;text-align:center;margin-top:14px;min-height:18px"></div>
    </div>
  </div>

  <script>
    document.getElementById('newPwd2').addEventListener('keydown', e => {
      if (e.key === 'Enter') changePassword();
    });

    async function init() {
      const res = await fetch('/api/auth/me');
      const me = await res.json();
      if (!me.loggedIn) { window.location.href = '/login.html'; }
    }

    async function changePassword() {
      const btn = document.getElementById('pwdBtn');
      const msg = document.getElementById('pwdMsg');
      const curPwd = document.getElementById('curPwd').value;
      const newPwd = document.getElementById('newPwd').value;
      const newPwd2 = document.getElementById('newPwd2').value;

      msg.style.color = 'var(--red)';
      msg.textContent = '';

      if (!curPwd || !newPwd || !newPwd2) { msg.textContent = '请填写所有字段'; return; }
      if (newPwd !== newPwd2) { msg.textContent = '两次新密码输入不一致'; return; }

      btn.disabled = true;
      btn.textContent = '提交中...';

      const res = await fetch('/api/auth/change-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ currentPassword: curPwd, newPassword: newPwd })
      });
      const data = await res.json();

      btn.disabled = false;
      btn.textContent = '确认修改';

      if (data.success) {
        msg.style.color = 'var(--green)';
        msg.textContent = '密码已修改成功';
        document.getElementById('curPwd').value = '';
        document.getElementById('newPwd').value = '';
        document.getElementById('newPwd2').value = '';
      } else {
        msg.textContent = data.error || '修改失败';
      }
    }

    init();
  </script>
</body>
</html>
