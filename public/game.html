<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>比赛投注 — 破产模拟器</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* ── Game Hero ── */
    .game-hero {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 24px 22px;
      margin-bottom: 14px;
      text-align: center;
    }

    .hero-matchup {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      margin-bottom: 20px;
    }

    .hero-team {
      flex: 1;
      text-align: center;
    }

    .hero-team-name {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }

    .hero-team-role {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .hero-vs {
      padding: 0 20px;
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 700;
      letter-spacing: 2px;
    }

    .countdown-block {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .countdown {
      font-size: 36px;
      font-weight: 800;
      color: var(--gold);
      font-variant-numeric: tabular-nums;
      letter-spacing: 2px;
    }

    .countdown.urgent { color: var(--red); }
    .countdown-label { font-size: 11px; color: var(--text-muted); font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; }

    .status-msg {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .status-settled { color: var(--gold); font-size: 18px; font-weight: 700; }

    /* ── Odds Strip ── */
    .odds-strip {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .odds-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .odds-panel.side-a { border-left: 3px solid var(--blue); }
    .odds-panel.side-b { border-left: 3px solid var(--red); }

    .odds-team-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
    .odds-bets { font-size: 12px; color: var(--text-muted); }

    .odds-number {
      font-size: 32px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }
    .side-a .odds-number { color: var(--blue); }
    .side-b .odds-number { color: var(--red); }
    .odds-x { font-size: 14px; font-weight: 600; opacity: 0.7; }

    .pool-strip {
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 14px;
      padding: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }
    .pool-strip span { color: var(--text); font-weight: 600; font-variant-numeric: tabular-nums; }

    /* ── Bet Form ── */
    .bet-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 14px;
    }

    .bet-form-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .bet-form-body { padding: 20px; }

    .team-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 18px;
    }

    .team-toggle-btn {
      padding: 14px 12px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border-bright);
      background: var(--surface2);
      cursor: pointer;
      transition: all var(--transition);
      font-family: inherit;
      text-align: center;
    }

    .team-toggle-btn .t-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 3px;
    }

    .team-toggle-btn .t-odds {
      font-size: 20px;
      font-weight: 800;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }

    .team-toggle-btn.sel-a {
      border-color: var(--blue);
      background: var(--blue-dim);
    }
    .team-toggle-btn.sel-a .t-name { color: var(--blue); }
    .team-toggle-btn.sel-a .t-odds { color: var(--blue); }

    .team-toggle-btn.sel-b {
      border-color: var(--red);
      background: var(--red-dim);
    }
    .team-toggle-btn.sel-b .t-name { color: var(--red); }
    .team-toggle-btn.sel-b .t-odds { color: var(--red); }

    .team-toggle-btn:hover:not(.sel-a):not(.sel-b) {
      border-color: var(--text-muted);
    }

    .amount-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .amount-input-row {
      display: flex;
      align-items: center;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
      margin-bottom: 10px;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .amount-input-row:focus-within {
      border-color: var(--gold-border);
      box-shadow: 0 0 0 3px var(--gold-dim);
    }

    .amount-prefix {
      padding: 13px 14px;
      font-size: 17px;
      font-weight: 700;
      color: var(--text-muted);
      background: var(--surface3);
      border-right: 1px solid var(--border);
      user-select: none;
    }

    .amount-input-row input {
      flex: 1;
      padding: 13px 16px;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 18px;
      font-weight: 700;
      outline: none;
      font-family: var(--font-mono);
      font-variant-numeric: tabular-nums;
    }

    .quick-chips {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .chip {
      padding: 6px 14px;
      border-radius: var(--radius-pill);
      background: var(--surface2);
      border: 1px solid var(--border-bright);
      color: var(--text-dim);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      font-family: inherit;
    }
    .chip:hover { border-color: var(--gold-border); color: var(--gold); }

    .payout-preview {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      margin-bottom: 18px;
      display: none;
      overflow: hidden;
    }
    .payout-preview.visible { display: grid; grid-template-columns: 1fr 1px 1fr; }
    .preview-divider { background: var(--border); }
    .preview-side { padding: 13px 15px; }
    .preview-win { background: var(--green-dim); }
    .preview-lose { background: var(--surface2); }
    .preview-side-label { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .preview-side-amount { font-size: 20px; font-weight: 800; font-variant-numeric: tabular-nums; margin-bottom: 2px; }
    .preview-win .preview-side-amount { color: var(--green); }
    .preview-lose .preview-side-amount { color: var(--text-muted); }
    .preview-lose-recovery .preview-side-amount { color: var(--gold) !important; }
    .preview-side-sub { font-size: 11px; margin-bottom: 4px; }
    .preview-win .preview-side-sub { color: var(--green); }
    .preview-lose .preview-side-sub { color: var(--text-muted); }
    .preview-side-breakdown { font-size: 10px; color: var(--text-muted); line-height: 1.6; }

    .my-bet-outcomes {
      margin-top: 14px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .my-bet-outcome {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 11px 13px;
    }
    .outcome-win { background: var(--green-dim); border-color: rgba(48,216,123,0.2); }
    .outcome-recover { border-color: var(--gold-border); }
    .my-bet-outcome-label { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 5px; }
    .my-bet-outcome-amount { font-size: 17px; font-weight: 800; font-variant-numeric: tabular-nums; margin-bottom: 3px; }
    .outcome-win .my-bet-outcome-amount { color: var(--green); }
    .outcome-recover .my-bet-outcome-amount { color: var(--gold); }
    .outcome-loss .my-bet-outcome-amount { color: var(--text-muted); }
    .my-bet-outcome-breakdown { font-size: 10px; color: var(--text-muted); line-height: 1.5; }

    /* ── Add Bet ── */
    .add-bet-wrap {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .add-bet-toggle-btn {
      width: 100%;
      background: var(--surface2);
      border: 1px dashed var(--border-bright);
      border-radius: var(--radius-sm);
      padding: 9px 14px;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all var(--transition);
    }
    .add-bet-toggle-btn:hover, .add-bet-toggle-btn.open {
      border-color: var(--gold-border);
      color: var(--gold);
      border-style: solid;
    }
    .add-bet-body { margin-top: 14px; }
    .add-bet-summary {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 12px;
      padding: 9px 12px;
      background: var(--surface2);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
    }
    .add-bet-summary strong { color: var(--gold); font-variant-numeric: tabular-nums; }
    .add-bet-preview {
      display: grid;
      grid-template-columns: 1fr 1px 1fr;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
      margin-bottom: 12px;
    }
    .add-bet-preview-win { background: var(--green-dim); padding: 10px 13px; }
    .add-bet-preview-lose { background: var(--surface2); padding: 10px 13px; }
    .add-bet-preview-divider { background: var(--border); }
    .abp-label { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 5px; }
    .abp-amount { font-size: 16px; font-weight: 800; font-variant-numeric: tabular-nums; }
    .add-bet-preview-win .abp-amount { color: var(--green); }
    .add-bet-preview-lose .abp-amount { color: var(--text-muted); }
    .abp-sub { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

    /* ── My Bet Card ── */
    .my-bet-card {
      background: var(--surface);
      border: 1px solid var(--gold-border);
      border-radius: var(--radius);
      padding: 18px 20px;
      margin-bottom: 14px;
      display: none;
    }
    .my-bet-card.visible { display: block; }

    .my-bet-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .my-bet-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .my-bet-left { display: flex; align-items: center; gap: 12px; }

    .my-bet-team-tag {
      padding: 5px 12px;
      border-radius: var(--radius-pill);
      font-size: 13px;
      font-weight: 700;
    }
    .tag-a { background: var(--blue-dim); color: var(--blue); border: 1px solid var(--blue-border); }
    .tag-b { background: var(--red-dim); color: var(--red); border: 1px solid var(--red-border); }

    .my-bet-amount { font-size: 16px; font-weight: 700; font-variant-numeric: tabular-nums; }

    .my-bet-right { text-align: right; }
    .my-bet-return-label { font-size: 11px; color: var(--text-muted); margin-bottom: 2px; }
    .my-bet-return-val { font-size: 20px; font-weight: 800; color: var(--green); font-variant-numeric: tabular-nums; }

    /* ── Bets List ── */
    .bets-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .bets-card-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .bets-card-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .bets-count {
      font-size: 12px;
      color: var(--text-muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: var(--radius-pill);
      font-variant-numeric: tabular-nums;
    }

    .bet-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 20px;
      border-bottom: 1px solid var(--border);
      transition: background var(--transition);
    }
    .bet-row:last-child { border-bottom: none; }
    .bet-row:hover { background: rgba(255,255,255,0.015); }

    .bet-player-info { display: flex; align-items: center; gap: 10px; }
    .bet-name { font-size: 14px; font-weight: 600; }

    .bet-amount { font-size: 14px; font-weight: 700; color: var(--gold); font-variant-numeric: tabular-nums; }
    .bet-hidden { font-size: 13px; color: var(--text-muted); font-style: italic; }

    .no-bets {
      padding: 32px 20px;
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">
      <a href="/" style="color:var(--gold);text-decoration:none;font-size:14px;font-weight:600">← 大厅</a>
    </div>
    <div class="navbar-user">
      <span>余额 <span class="navbar-balance" id="navBalance">--</span></span>
      <span class="nav-username" id="navUsername">--</span>
    </div>
  </nav>

  <div class="container" style="max-width:680px">

    <!-- Game Hero -->
    <div class="game-hero">
      <div class="hero-matchup">
        <div class="hero-team">
          <div class="hero-team-name" id="teamA">--</div>
          <div class="hero-team-role">主队</div>
        </div>
        <div class="hero-vs">VS</div>
        <div class="hero-team">
          <div class="hero-team-name" id="teamB">--</div>
          <div class="hero-team-role">客队</div>
        </div>
      </div>
      <div id="timerSection">
        <div class="countdown-block">
          <div class="countdown" id="countdown">--:--:--</div>
          <div class="countdown-label">距投注截止</div>
        </div>
      </div>
    </div>

    <!-- Odds Panels -->
    <div class="odds-strip">
      <div class="odds-panel side-a">
        <div>
          <div class="odds-team-name" id="oddsTeamA">--</div>
          <div class="odds-bets" id="sumA">已投 ¥0</div>
        </div>
        <div style="text-align:right">
          <span class="odds-number" id="oddsA">--</span><span class="odds-x">x</span>
        </div>
      </div>
      <div class="odds-panel side-b">
        <div>
          <div class="odds-team-name" id="oddsTeamB">--</div>
          <div class="odds-bets" id="sumB">已投 ¥0</div>
        </div>
        <div style="text-align:right">
          <span class="odds-number" id="oddsB">--</span><span class="odds-x">x</span>
        </div>
      </div>
    </div>

    <!-- Pool -->
    <div class="pool-strip">总下注额 <span id="poolAmount">¥0</span></div>

    <!-- My Bet -->
    <div class="my-bet-card" id="myBetCard">
      <div class="my-bet-label">我的投注</div>
      <div class="my-bet-row">
        <div class="my-bet-left">
          <span class="my-bet-team-tag" id="myBetTag"></span>
          <span class="my-bet-amount" id="myBetAmount"></span>
        </div>
      </div>
      <div class="my-bet-outcomes" id="myBetOutcomes"></div>

      <!-- Add more bet -->
      <div class="add-bet-wrap" id="addBetWrap" style="display:none">
        <button class="add-bet-toggle-btn" id="addBetToggleBtn" onclick="toggleAddBet()">
          <span>➕ 加注</span>
          <span id="addBetChevron">▼</span>
        </button>
        <div class="add-bet-body" id="addBetBody" style="display:none">
          <div class="add-bet-summary" id="addBetSummary"></div>

          <div class="amount-label">追加金额</div>
          <div class="amount-input-row">
            <div class="amount-prefix">¥</div>
            <input type="number" id="addBetAmount" placeholder="0" min="1" oninput="updateAddBetPreview()">
          </div>
          <div class="quick-chips" style="margin-bottom:12px">
            <button class="chip" onclick="setAddAmount(1)">全押</button>
            <button class="chip" onclick="setAddAmount(0.5)">½</button>
            <button class="chip" onclick="setAddAmount(0.25)">¼</button>
            <button class="chip" onclick="setAddAmount(0.1)">10%</button>
          </div>

          <div class="add-bet-preview" id="addBetPreview" style="display:none">
            <div class="add-bet-preview-win">
              <div class="abp-label">🏆 加注后获胜</div>
              <div class="abp-amount" id="abpWinAmount">--</div>
              <div class="abp-sub" id="abpWinSub"></div>
            </div>
            <div class="add-bet-preview-divider"></div>
            <div class="add-bet-preview-lose">
              <div class="abp-label">💸 加注后落败</div>
              <div class="abp-amount" id="abpLoseAmount">--</div>
              <div class="abp-sub" id="abpLoseSub"></div>
            </div>
          </div>

          <button class="btn btn-primary" id="addBetBtn" onclick="submitAddBet()">确认加注</button>
          <div class="error-msg" id="addBetError"></div>
        </div>
      </div>
    </div>

    <!-- Bet Form -->
    <div class="bet-form" id="betForm" style="display:none">
      <div class="bet-form-header">下注</div>
      <div class="bet-form-body">
        <div class="team-toggle">
          <button class="team-toggle-btn" id="btnA" onclick="selectTeam('A')">
            <div class="t-name" id="btnAName">--</div>
            <div class="t-odds" id="btnAOdds">--</div>
          </button>
          <button class="team-toggle-btn" id="btnB" onclick="selectTeam('B')">
            <div class="t-name" id="btnBName">--</div>
            <div class="t-odds" id="btnBOdds">--</div>
          </button>
        </div>

        <div class="amount-label">投注金额</div>
        <div class="amount-input-row">
          <div class="amount-prefix">¥</div>
          <input type="number" id="betAmount" placeholder="0" min="1" oninput="updateExpected()">
        </div>

        <div class="quick-chips">
          <button class="chip" onclick="setAmount(1)">全押</button>
          <button class="chip" onclick="setAmount(0.5)">½</button>
          <button class="chip" onclick="setAmount(0.25)">¼</button>
          <button class="chip" onclick="setAmount(0.1)">10%</button>
          <button class="chip" onclick="setAmount(0.05)">5%</button>
        </div>

        <div class="payout-preview" id="payoutPreview">
          <div class="preview-side preview-win">
            <div class="preview-side-label">🏆 若获胜</div>
            <div class="preview-side-amount" id="previewWinAmount">--</div>
            <div class="preview-side-sub" id="previewWinProfit"></div>
            <div class="preview-side-breakdown" id="previewWinBreakdown"></div>
          </div>
          <div class="preview-divider"></div>
          <div class="preview-side preview-lose" id="previewLoseSide">
            <div class="preview-side-label">💸 若落败</div>
            <div class="preview-side-amount" id="previewLoseAmount">--</div>
            <div class="preview-side-sub" id="previewLoseSub"></div>
            <div class="preview-side-breakdown" id="previewLoseBreakdown"></div>
          </div>
        </div>

        <button class="btn btn-primary" id="betBtn" onclick="placeBet()">确认投注</button>
        <div class="error-msg" id="betError"></div>
      </div>
    </div>

    <!-- Bets List -->
    <div class="bets-card">
      <div class="bets-card-header">
        <span class="bets-card-title">当前投注</span>
        <span class="bets-count" id="betsCount">0</span>
      </div>
      <div id="betsList">
        <div class="no-bets">暂无投注</div>
      </div>
    </div>

  </div>

  <!-- Confirm Modal -->
  <div class="modal-overlay" id="confirmModal">
    <div class="modal" style="max-width:400px;text-align:center">
      <div style="font-size:32px;margin-bottom:14px">⚠️</div>
      <div class="modal-title" style="text-align:center">确认投注？</div>
      <p id="confirmText" style="font-size:15px;color:var(--text);margin-bottom:16px;font-weight:600"></p>
      <div id="confirmOutcomes" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;text-align:left"></div>
      <p style="font-size:12px;color:var(--text-muted);margin-bottom:24px">一旦下注，概不后悔。</p>
      <div style="display:flex;gap:10px">
        <button class="btn btn-primary" style="margin-top:0" onclick="confirmBet()">确认</button>
        <button class="btn btn-ghost" style="border-radius:var(--radius-sm);flex:1" onclick="closeConfirm()">取消</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const gameId = parseInt(window.location.pathname.split('/')[2]);
    const socket = io();

    let myUser = null;
    let gameData = null;
    let selectedTeam = null;
    let countdownTimer = null;
    let currentMyBet = null; // tracks placed bet for add-bet feature

    async function init() {
      const meRes = await fetch('/api/auth/me');
      myUser = await meRes.json();
      if (!myUser.loggedIn) { window.location.href = '/login.html'; return; }

      document.getElementById('navUsername').textContent = myUser.username;
      document.getElementById('navBalance').textContent = '¥' + myUser.balance.toLocaleString();

      await loadGame();
      socket.emit('joinGame', gameId);
    }

    async function loadGame() {
      const res = await fetch(`/api/game/${gameId}`);
      if (!res.ok) { alert('比赛不存在'); window.location.href = '/'; return; }
      const data = await res.json();
      gameData = data.game;
      renderGame(data);
    }

    function renderGame(data) {
      const { game, bets, totals, myBet } = data;

      document.title = `${game.team_a} vs ${game.team_b} — 破产模拟器`;

      // Hero
      document.getElementById('teamA').textContent = game.team_a;
      document.getElementById('teamB').textContent = game.team_b;

      // Odds panels
      document.getElementById('oddsTeamA').textContent = game.team_a;
      document.getElementById('oddsTeamB').textContent = game.team_b;
      document.getElementById('oddsA').textContent = game.odds_a.toFixed(2);
      document.getElementById('oddsB').textContent = game.odds_b.toFixed(2);

      // Team buttons
      document.getElementById('btnAName').textContent = game.team_a;
      document.getElementById('btnBName').textContent = game.team_b;
      document.getElementById('btnAOdds').textContent = game.odds_a.toFixed(2) + 'x';
      document.getElementById('btnBOdds').textContent = game.odds_b.toFixed(2) + 'x';

      renderTotals(totals);
      renderBets(bets, game);

      const isOpen = game.status === 'open' || game.status === 'pending';
      if (isOpen) {
        startCountdown(game.deadline);
        if (myBet) {
          showMyBet(myBet, game);
        } else {
          document.getElementById('betForm').style.display = 'block';
        }
      } else if (game.status === 'closed') {
        showClosed();
        if (myBet) showMyBet(myBet, game);
      } else if (game.status === 'settled') {
        showSettled(game);
        if (myBet) showMyBet(myBet, game);
      }
    }

    function renderTotals(totals) {
      document.getElementById('poolAmount').textContent = '¥' + totals.pool.toLocaleString();
      document.getElementById('sumA').textContent = '已投 ¥' + totals.sumA.toLocaleString();
      document.getElementById('sumB').textContent = '已投 ¥' + totals.sumB.toLocaleString();
    }

    function renderBets(bets, game) {
      const el = document.getElementById('betsList');
      const count = document.getElementById('betsCount');
      count.textContent = bets.length;
      if (!bets.length) {
        el.innerHTML = '<div class="no-bets">暂无投注</div>';
        return;
      }
      el.innerHTML = bets.map(b => {
        const isA = b.team === 'A';
        const teamName = isA ? (game || gameData).team_a : (game || gameData).team_b;
        const tagClass = isA ? 'tag-a' : 'tag-b';
        return `
          <div class="bet-row">
            <div class="bet-player-info">
              <span class="bet-name">${b.username}</span>
              <span class="my-bet-team-tag ${tagClass}" style="padding:3px 10px;font-size:12px">${teamName}</span>
            </div>
            <span class="bet-amount">¥${b.amount.toLocaleString()}</span>
          </div>`;
      }).join('');
    }

    // ── Preview calculation (mirrors backend calcBetOutcome) ──
    function calcPreview(amt, odds) {
      const totalAssets = (myUser.balance || 0) + (myUser.pending_bets || 0) - (myUser.loan_amount || 0);
      const postBetBalance = (myUser.balance || 0) - amt;
      const loanAmt = myUser.loan_amount || 0;

      const basePayout = Math.floor(amt * odds);
      const baseProfit = basePayout - amt;
      let adjustedProfit = baseProfit;
      let brokieTier = 0;

      if (totalAssets < 0)          { brokieTier = 1; adjustedProfit = Math.floor(basePayout * 1.15) - amt; }
      else if (totalAssets <= 5000) { brokieTier = 2; adjustedProfit = Math.floor(baseProfit * 1.15); }

      let keepRate = 1.0;
      if (loanAmt > 0) {
        if (postBetBalance >= 3 * loanAmt)      keepRate = 0.50;
        else if (postBetBalance >= 2 * loanAmt) keepRate = 0.70;
        else if (postBetBalance >= loanAmt)     keepRate = 0.90;
      }
      if (keepRate < 1.0) adjustedProfit = Math.floor(adjustedProfit * keepRate);

      let recovery = 0;
      if (totalAssets < 0)          recovery = Math.floor(amt * 0.30);
      else if (totalAssets <= 5000) recovery = Math.floor(amt * 0.10);

      return { basePayout, finalPayout: amt + adjustedProfit, profit: adjustedProfit, recovery, brokieTier, keepRate };
    }

    function previewBreakdown(amt, odds, p) {
      const winParts = [`¥${amt.toLocaleString()} × ${odds.toFixed(2)}`];
      if (p.brokieTier === 1) winParts.push('破产加成 ×1.15（全额）');
      if (p.brokieTier === 2) winParts.push('破产加成 ×1.15（利润）');
      if (p.keepRate < 1.0)   winParts.push(`债务税 ×${p.keepRate.toFixed(2)}`);
      const loseText = p.brokieTier === 1 ? '破产保险 30% 返还'
                     : p.brokieTier === 2 ? '破产保险 10% 返还'
                     : '无保险返还';
      return { win: winParts.join(' → '), lose: loseText };
    }

    function showMyBet(myBet, game) {
      document.getElementById('betForm').style.display = 'none';
      const card = document.getElementById('myBetCard');
      card.classList.add('visible');
      const isA = myBet.team === 'A';
      const teamName = isA ? game.team_a : game.team_b;
      const odds = isA ? game.odds_a : game.odds_b;
      const tag = document.getElementById('myBetTag');
      tag.textContent = teamName;
      tag.className = 'my-bet-team-tag ' + (isA ? 'tag-a' : 'tag-b');
      document.getElementById('myBetAmount').textContent = '¥' + myBet.amount.toLocaleString();

      const outcomesEl = document.getElementById('myBetOutcomes');

      if (game.status === 'settled') {
        const won = myBet.team === game.winner;
        if (won) {
          const payout = (myBet.payout > 0) ? myBet.payout : Math.floor(myBet.amount * odds);
          outcomesEl.innerHTML = `
            <div class="my-bet-outcome outcome-win" style="grid-column:1/-1">
              <div class="my-bet-outcome-label">🏆 获胜</div>
              <div class="my-bet-outcome-amount">¥${payout.toLocaleString()}</div>
              <div class="my-bet-outcome-breakdown">净赚 +¥${(payout - myBet.amount).toLocaleString()}</div>
            </div>`;
        } else {
          const recovery = myBet.recovery || 0;
          if (recovery > 0) {
            outcomesEl.innerHTML = `
              <div class="my-bet-outcome outcome-recover" style="grid-column:1/-1">
                <div class="my-bet-outcome-label">💸 落败（破产保险）</div>
                <div class="my-bet-outcome-amount">返还 ¥${recovery.toLocaleString()}</div>
                <div class="my-bet-outcome-breakdown">净亏 -¥${(myBet.amount - recovery).toLocaleString()}</div>
              </div>`;
          } else {
            outcomesEl.innerHTML = `
              <div class="my-bet-outcome outcome-loss" style="grid-column:1/-1">
                <div class="my-bet-outcome-label">💸 落败</div>
                <div class="my-bet-outcome-amount">-¥${myBet.amount.toLocaleString()}</div>
                <div class="my-bet-outcome-breakdown">全额亏损</div>
              </div>`;
          }
        }
      } else {
        const p = calcPreview(myBet.amount, odds);
        const bd = previewBreakdown(myBet.amount, odds, p);
        const loseClass = p.recovery > 0 ? 'outcome-recover' : 'outcome-loss';
        const loseAmtHTML = p.recovery > 0 ? `返还 ¥${p.recovery.toLocaleString()}` : '全额亏损';
        outcomesEl.innerHTML = `
          <div class="my-bet-outcome outcome-win">
            <div class="my-bet-outcome-label">🏆 若获胜</div>
            <div class="my-bet-outcome-amount">¥${p.finalPayout.toLocaleString()}</div>
            <div class="my-bet-outcome-breakdown">${bd.win}</div>
          </div>
          <div class="my-bet-outcome ${loseClass}">
            <div class="my-bet-outcome-label">💸 若落败</div>
            <div class="my-bet-outcome-amount">${loseAmtHTML}</div>
            <div class="my-bet-outcome-breakdown">${bd.lose}</div>
          </div>`;

        // Show add-bet section for open/pending games
        currentMyBet = { ...myBet, odds };
        const addWrap = document.getElementById('addBetWrap');
        addWrap.style.display = 'block';
        document.getElementById('addBetSummary').innerHTML =
          `当前已押 <strong>¥${myBet.amount.toLocaleString()}</strong> · 余额 <strong>¥${myUser.balance.toLocaleString()}</strong>`;
      }
    }

    // ── Add Bet ──

    function toggleAddBet() {
      const body = document.getElementById('addBetBody');
      const btn  = document.getElementById('addBetToggleBtn');
      const chev = document.getElementById('addBetChevron');
      const open = body.style.display === 'none';
      body.style.display = open ? 'block' : 'none';
      btn.classList.toggle('open', open);
      chev.textContent = open ? '▲' : '▼';
      if (!open) {
        document.getElementById('addBetAmount').value = '';
        document.getElementById('addBetPreview').style.display = 'none';
        document.getElementById('addBetError').textContent = '';
      }
    }

    function setAddAmount(fraction) {
      document.getElementById('addBetAmount').value = Math.floor(myUser.balance * fraction);
      updateAddBetPreview();
    }

    // Mirrors calcPreview but uses totalAmt for payout, additionalAmt for debt-tax balance check
    function calcAddBetPreview(existingAmt, additionalAmt, odds) {
      const totalAmt = existingAmt + additionalAmt;
      // myUser.balance is already reduced by existingAmt (bet was placed earlier)
      // pending_bets already includes existingAmt
      const totalAssets = (myUser.balance || 0) + (myUser.pending_bets || 0) - (myUser.loan_amount || 0);
      const postBetBalance = (myUser.balance || 0) - additionalAmt;
      const loanAmt = myUser.loan_amount || 0;

      const basePayout = Math.floor(totalAmt * odds);
      const baseProfit = basePayout - totalAmt;
      let adjustedProfit = baseProfit;
      let brokieTier = 0;

      if (totalAssets < 0)          { brokieTier = 1; adjustedProfit = Math.floor(basePayout * 1.15) - totalAmt; }
      else if (totalAssets <= 5000) { brokieTier = 2; adjustedProfit = Math.floor(baseProfit * 1.15); }

      let keepRate = 1.0;
      if (loanAmt > 0) {
        if (postBetBalance >= 3 * loanAmt)      keepRate = 0.50;
        else if (postBetBalance >= 2 * loanAmt) keepRate = 0.70;
        else if (postBetBalance >= loanAmt)     keepRate = 0.90;
      }
      if (keepRate < 1.0) adjustedProfit = Math.floor(adjustedProfit * keepRate);

      let recovery = 0;
      if (totalAssets < 0)          recovery = Math.floor(totalAmt * 0.30);
      else if (totalAssets <= 5000) recovery = Math.floor(totalAmt * 0.10);

      return { totalAmt, finalPayout: totalAmt + adjustedProfit, profit: adjustedProfit, recovery };
    }

    function updateAddBetPreview() {
      const additional = parseInt(document.getElementById('addBetAmount').value);
      const previewEl  = document.getElementById('addBetPreview');
      if (!additional || additional <= 0 || !currentMyBet) {
        previewEl.style.display = 'none';
        return;
      }

      const p = calcAddBetPreview(currentMyBet.amount, additional, currentMyBet.odds);
      document.getElementById('abpWinAmount').textContent = '¥' + p.finalPayout.toLocaleString();
      document.getElementById('abpWinSub').textContent = `净赚 +¥${p.profit.toLocaleString()} · 总押 ¥${p.totalAmt.toLocaleString()}`;

      const loseEl = document.getElementById('abpLoseAmount');
      if (p.recovery > 0) {
        loseEl.textContent = '返还 ¥' + p.recovery.toLocaleString();
        loseEl.style.color = 'var(--gold)';
        document.getElementById('abpLoseSub').textContent = `净亏 -¥${(p.totalAmt - p.recovery).toLocaleString()}`;
      } else {
        loseEl.textContent = '全额亏损';
        loseEl.style.color = '';
        document.getElementById('abpLoseSub').textContent = `-¥${p.totalAmt.toLocaleString()}`;
      }

      previewEl.style.display = 'grid';
      // Update summary
      document.getElementById('addBetSummary').innerHTML =
        `当前已押 <strong>¥${currentMyBet.amount.toLocaleString()}</strong> · 追加 <strong>¥${additional.toLocaleString()}</strong> → 总押 <strong>¥${p.totalAmt.toLocaleString()}</strong>`;
    }

    async function submitAddBet() {
      const additional = parseInt(document.getElementById('addBetAmount').value);
      const errorEl = document.getElementById('addBetError');
      const btn = document.getElementById('addBetBtn');
      errorEl.textContent = '';

      if (!additional || additional <= 0) { errorEl.textContent = '请输入有效金额'; return; }

      btn.disabled = true;
      btn.textContent = '提交中...';

      const res = await fetch(`/api/game/${gameId}/add-bet`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ amount: additional })
      });
      const data = await res.json();

      btn.disabled = false;
      btn.textContent = '确认加注';

      if (data.success) {
        myUser.balance = data.newBalance;
        document.getElementById('navBalance').textContent = '¥' + data.newBalance.toLocaleString();
        await loadGame();
      } else {
        errorEl.textContent = data.error;
      }
    }

    function showClosed() {
      clearInterval(countdownTimer);
      document.getElementById('timerSection').innerHTML = '<div class="status-msg">投注已截止，等待比赛结果</div>';
      document.getElementById('betForm').style.display = 'none';
    }

    function showSettled(game) {
      clearInterval(countdownTimer);
      const winnerName = game.winner === 'A' ? game.team_a : game.team_b;
      document.getElementById('timerSection').innerHTML = `<div class="status-settled">🏆 ${winnerName} 获胜</div>`;
      document.getElementById('betForm').style.display = 'none';
    }

    function startCountdown(deadline) {
      clearInterval(countdownTimer);
      function tick() {
        const diff = new Date(deadline) - new Date();
        if (diff <= 0) { clearInterval(countdownTimer); showClosed(); return; }
        const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
        const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
        const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
        const el = document.getElementById('countdown');
        el.textContent = `${h}:${m}:${s}`;
        el.className = 'countdown' + (diff < 300000 ? ' urgent' : '');
      }
      tick();
      countdownTimer = setInterval(tick, 1000);
    }

    function selectTeam(team) {
      selectedTeam = team;
      document.getElementById('btnA').className = 'team-toggle-btn' + (team === 'A' ? ' sel-a' : '');
      document.getElementById('btnB').className = 'team-toggle-btn' + (team === 'B' ? ' sel-b' : '');
      updateExpected();
    }

    function setAmount(fraction) {
      document.getElementById('betAmount').value = Math.floor(myUser.balance * fraction);
      updateExpected();
    }

    function updateExpected() {
      const amt = parseInt(document.getElementById('betAmount')?.value);
      const preview = document.getElementById('payoutPreview');
      if (!preview) return;
      if (!selectedTeam || !amt || !gameData || amt <= 0) {
        preview.classList.remove('visible');
        return;
      }
      const odds = selectedTeam === 'A' ? gameData.odds_a : gameData.odds_b;
      const p = calcPreview(amt, odds);
      const bd = previewBreakdown(amt, odds, p);

      document.getElementById('previewWinAmount').textContent = '¥' + p.finalPayout.toLocaleString();
      document.getElementById('previewWinProfit').textContent = '净赚 +¥' + p.profit.toLocaleString();
      document.getElementById('previewWinBreakdown').textContent = bd.win;

      const loseSide = document.getElementById('previewLoseSide');
      if (p.recovery > 0) {
        document.getElementById('previewLoseAmount').textContent = '返还 ¥' + p.recovery.toLocaleString();
        document.getElementById('previewLoseSub').textContent = '净亏 -¥' + (amt - p.recovery).toLocaleString();
        loseSide.classList.add('preview-lose-recovery');
      } else {
        document.getElementById('previewLoseAmount').textContent = '全额亏损';
        document.getElementById('previewLoseSub').textContent = '-¥' + amt.toLocaleString();
        loseSide.classList.remove('preview-lose-recovery');
      }
      document.getElementById('previewLoseBreakdown').textContent = bd.lose;
      preview.classList.add('visible');
    }

    function placeBet() {
      const amount = parseInt(document.getElementById('betAmount').value);
      const errorEl = document.getElementById('betError');
      errorEl.textContent = '';
      if (!selectedTeam) { errorEl.textContent = '请先选择投注队伍'; return; }
      if (!amount || amount <= 0) { errorEl.textContent = '请输入有效金额'; return; }

      const teamName = selectedTeam === 'A' ? gameData.team_a : gameData.team_b;
      const odds = selectedTeam === 'A' ? gameData.odds_a : gameData.odds_b;
      const p = calcPreview(amount, odds);
      const bd = previewBreakdown(amount, odds, p);

      document.getElementById('confirmText').textContent = `押 ${teamName}  ¥${amount.toLocaleString()}  (${odds.toFixed(2)}x)`;

      const loseHTML = p.recovery > 0
        ? `<div style="font-size:17px;font-weight:800;color:var(--gold);font-variant-numeric:tabular-nums;margin-bottom:2px">返还 ¥${p.recovery.toLocaleString()}</div><div style="font-size:10px;color:var(--text-muted)">${bd.lose}</div>`
        : `<div style="font-size:17px;font-weight:800;color:var(--text-muted);font-variant-numeric:tabular-nums;margin-bottom:2px">全额亏损</div><div style="font-size:10px;color:var(--text-muted)">${bd.lose}</div>`;

      document.getElementById('confirmOutcomes').innerHTML = `
        <div style="background:var(--green-dim);border:1px solid rgba(48,216,123,0.2);border-radius:var(--radius-sm);padding:12px 13px">
          <div style="font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:6px">🏆 若获胜</div>
          <div style="font-size:20px;font-weight:800;color:var(--green);font-variant-numeric:tabular-nums;margin-bottom:2px">¥${p.finalPayout.toLocaleString()}</div>
          <div style="font-size:11px;color:var(--green);margin-bottom:3px">净赚 +¥${p.profit.toLocaleString()}</div>
          <div style="font-size:10px;color:var(--text-muted)">${bd.win}</div>
        </div>
        <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 13px">
          <div style="font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:6px">💸 若落败</div>
          ${loseHTML}
        </div>`;

      document.getElementById('confirmModal').classList.add('open');
    }

    function closeConfirm() {
      document.getElementById('confirmModal').classList.remove('open');
    }

    async function confirmBet() {
      closeConfirm();
      const amount = parseInt(document.getElementById('betAmount').value);
      const btn = document.getElementById('betBtn');
      btn.disabled = true;
      btn.textContent = '提交中...';

      const res = await fetch(`/api/game/${gameId}/bet`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ team: selectedTeam, amount })
      });
      const data = await res.json();

      if (data.success) {
        myUser.balance = data.newBalance;
        document.getElementById('navBalance').textContent = '¥' + data.newBalance.toLocaleString();
        await loadGame();
      } else {
        document.getElementById('betError').textContent = data.error;
        btn.disabled = false;
        btn.textContent = '确认投注';
      }
    }

    socket.on('betUpdate', ({ bets, totals }) => {
      renderBets(bets, gameData);
      renderTotals(totals);
    });

    socket.on('gameStatusChanged', ({ status, winner }) => {
      if (status === 'closed') showClosed();
      if (status === 'settled') showSettled({ ...gameData, winner });
    });

    init();
  </script>
</body>
</html>
